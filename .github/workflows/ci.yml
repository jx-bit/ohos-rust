name: CI

on:
  release:
    types: [published]
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'DRY_RUN mode (skip compilation, test signing only)'
        required: false
        default: false
        type: boolean

permissions: write-all

