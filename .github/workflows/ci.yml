  #         curl -fLO https://github.com/hqzing/ohos-node/releases/download/v24.2.0/node-v24.2.0-openharmony-arm64.tar.gz
  #         mkdir /__e/node24/bin
  #         tar -zxf node-v24.2.0-openharmony-arm64.tar.gz -C /opt
  #         ln -s /opt/node-v24.2.0-openharmony-arm64/bin/node /__e/node24/bin/node
  #     - name: Checkout
  #       uses: actions/checkout@v4
  #     - name: Build
  #       run: |
  #         echo "=== ARM64 本地编译 aarch64-unknown-linux-ohos ==="
  #         ./arm64/build.sh
  #     - name: Upload artifact
  #       uses: actions/upload-artifact@v4
  #       with:
  #         path: ${{ github.workspace }}/rust-${{ env.RUST_VERSION }}-aarch64-unknown-linux-ohos.tar.gz
  #         name: rust-${{ env.RUST_VERSION }}-aarch64-unknown-linux-ohos-native
  #     - name: Upload release asset
  #       uses: softprops/action-gh-release@v2
  #       if: github.event_name == 'release'
  #       with:
  #         files: ${{ github.workspace }}/rust-${{ env.RUST_VERSION }}-aarch64-unknown-linux-ohos.tar.gz
  build-on-x86_64:
    runs-on: ubuntu-24.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    outputs:
      rust_version: ${{ steps.version.outputs.rust_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine Rust version
        id: version
        run: |
          SELECT="${{ github.event.inputs.rust_version_select || '1.95.0' }}"
          CUSTOM="${{ github.event.inputs.rust_version_custom || '' }}"

          case "$SELECT" in
            'custom')
              if [ -z "$CUSTOM" ]; then
                echo "Error: custom version selected but no custom version provided"
                exit 1
              fi
              RUST_VER="$CUSTOM"
              ;;
            *)
              RUST_VER="$SELECT"
              ;;
          esac

          echo "rust_version=$RUST_VER" >> $GITHUB_OUTPUT
          echo "=== Building Rust version: $RUST_VER ==="

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-docker-x86_64-${{ hashFiles('x86_64/Dockerfile',
            'x86_64/scripts/*.sh') }}
          restore-keys: |
            ${{ runner.os }}-docker-x86_64-

      - name: Build Docker image with cache
        uses: docker/build-push-action@v6
        with:
          context: .
          file: x86_64/Dockerfile
          push: false
          load: true
          tags: rust-ohos-x86_64
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Move Docker cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Build
        run: |
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            -e DRY_RUN="$DRY_RUN" \
            -e RUST_VERSION="${{ steps.version.outputs.rust_version }}" \
            rust-ohos-x86_64 ./x86_64/build.sh

      # 1. 上传全家桶
      - name: Upload toolchain artifact
        uses: actions/upload-artifact@v4
        with:
          path: ${{ github.workspace }}/rust-${{ steps.version.outputs.rust_version
            }}-aarch64-unknown-linux-ohos.tar.gz
          name: rust-${{ steps.version.outputs.rust_version
            }}-aarch64-unknown-linux-ohos-cross
          retention-days: 90

      # 2. 上传独立 rust-analyzer
      - name: Upload rust-analyzer artifact
        uses: actions/upload-artifact@v4
        with:
          path: ${{ github.workspace }}/rust-analyzer-${{
            steps.version.outputs.rust_version
            }}-aarch64-unknown-linux-ohos.tar.gz
          name: rust-analyzer-${{ steps.version.outputs.rust_version
            }}-aarch64-unknown-linux-ohos-cross
          retention-days: 90

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'release'
        with:
          files: |
            ${{ github.workspace }}/rust-${{ steps.version.outputs.rust_version }}-aarch64-unknown-linux-ohos.tar.gz
            ${{ github.workspace }}/rust-analyzer-${{ steps.version.outputs.rust_version }}-aarch64-unknown-linux-ohos.tar.gz
