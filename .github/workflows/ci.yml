name: CI

# run-name 说明:
# - 手动触发(workflow_dispatch): 显示 "Build Rust {版本} for OHOS"
# - 其他触发方式: 返回空字符串，GitHub 使用默认显示规则
#   - PR: 显示 PR 标题
#   - Push: 显示 commit 标题
#   - Release: 显示 release tag name
run-name: "${{ github.event_name == 'workflow_dispatch' && format('Build Rust
  {0} for OHOS', github.event.inputs.rust_version_select == 'custom' &&
  github.event.inputs.rust_version_custom ||
  github.event.inputs.rust_version_select || '1.95.0') || '' }}"

on:
  release:
    types: [ published ]
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "DRY_RUN mode (skip compilation, test signing only)"
        required: false
        default: false
        type: boolean
      rust_version_select:
        description: "Rust version (select from list)"
        required: false
        default: "1.95.0"
        type: choice
        options:
          - "1.95.0"
          - "1.89.0"
          - "custom"
      rust_version_custom:
        description: "Custom Rust version (only used when \"custom\" is selected above,
          e.g., 1.90.0)"
        required: false
        default: ""
        type: string

permissions: write-all

jobs:
  # build-on-arm64:
  #   runs-on: ubuntu-24.04-arm
  #   env:
